name: Deploy GitHub Pages

on:
  push:
    branches:
      - dev
  workflow_dispatch:

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Require worker relay URL
        env:
          WORKER_URL: ${{ vars.WORKER_URL }}
        run: |
          if [ -z "$WORKER_URL" ]; then
            echo "Repository variable WORKER_URL must be set to wsstelnet://<worker>.workers.dev/bbs" >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        env:
          DEFAULT_SITE: ${{ vars.WORKER_URL }}
        run: npm run build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4